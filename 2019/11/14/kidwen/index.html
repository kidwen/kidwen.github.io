    <div class="article-entry" itemprop="articleBody">
      
        <ol>
<li>学而第一<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br></pre></td><td class="code"><pre><span class="line">子曰：“学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知，而不愠，不亦君子乎？”</span><br><span class="line"></span><br><span class="line">国学有子曰：“其为人也孝弟，而好犯上者，鲜矣；不好犯上，而好作乱者，未之有也。君子务本，本立而道生。孝弟也者，其为仁之本与！”</span><br><span class="line"></span><br><span class="line">国学子曰：“巧言令色，鲜矣仁！”</span><br><span class="line"></span><br><span class="line">国学曾子曰：“吾日三省吾身，为人谋而不忠乎？与朋友交而不信乎？传不习乎？”</span><br><span class="line"></span><br><span class="line">国学子曰：“道千乘之国，敬事而信，节用而爱人，使民以时。”</span><br><span class="line"></span><br><span class="line">国学子曰：“弟子入则孝，出则悌，谨而信，泛爱众，而亲仁。行有余力，则以学文。”</span><br><span class="line"></span><br><span class="line">国学子夏曰：“贤贤易色；事父母，能竭其力，事君，能致其身；与朋友交，言而有信。虽曰未学，吾必谓之学矣。”</span><br><span class="line"></span><br><span class="line">国学子曰：“君子不重，则不威。学则不固。主忠信。无友不如己者。过则勿惮改。”</span><br><span class="line"></span><br><span class="line">国学曾子曰：“慎终追远，民德归厚矣。”</span><br><span class="line"></span><br><span class="line">国学子禽问于子贡曰：“夫子至于是邦也，必闻其政。求之与？抑与之与？”子贡曰：“夫子温、良、恭、俭、让以得之。夫子之求之也，其诸异乎人之求之与！”</span><br><span class="line"></span><br><span class="line">国学子曰：“父在，观其志；父没，观其行；三年无改于父之道，可谓孝矣。”</span><br><span class="line"></span><br><span class="line">国学有子曰：“礼之用，和为贵。先王之道斯为美，小大由之。有所不行，知和而和，不以礼节之，亦不可行也。”</span><br><span class="line"></span><br><span class="line">国学有子曰：“信近于义，言可复也。恭近于礼，远耻辱也。因不失其亲，亦可宗也。”</span><br><span class="line"></span><br><span class="line">国学子曰：“君子食无求饱，居无求安，敏于事而慎于言，就有道而正焉，可谓好学也已。”</span><br><span class="line"></span><br><span class="line">国学子贡曰：“贫而无谄，富而无骄，何如？”子曰：“可也。未若贫而乐，富而好礼者也。”</span><br><span class="line"></span><br><span class="line">国学子贡曰：“《诗》云：‘如切如磋，如琢如磨’，其斯之谓与？”子曰：“赐也，始可与言《诗》已矣。告诸往而知来者。”</span><br><span class="line"></span><br><span class="line">国学子曰：“不患人之不己知，患不知人也。”</span><br></pre></td></tr></table></figure>
</li>
</ol>
